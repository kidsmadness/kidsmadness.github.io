/* BUILD DROPDOWNS */

function populate(){

teams.forEach((team,i)=>{

let option=document.createElement("option");
option.value=i;
option.text=`${team.name} (#${team.seed} ${team.region})`;

teamA.appendChild(option);
teamB.appendChild(option.cloneNode(true));

});

}

/* RENDER CARDS */

function render(){

let a=teams[teamA.value];
let b=teams[teamB.value];

if(!a || !b) return;

cardA.innerHTML=createCard(a,"A");
cardB.innerHTML=createCard(b,"B");

}

function createCard(team,id){

return `
<div class="card" style="background:${team.color}" id="${id}">
<img class="teamImage" src="${team.logo}">
<h2>${team.name}</h2>
<div class="stat">Seed: #${team.seed}</div>
<div class="stat">Region: ${team.region}</div>
<div class="stat">Mascot: ${team.mascot}</div>
<div class="stat">Record: ${team.record}</div>
<button onclick="pick('${id}')">Pick ${team.name}</button>
</div>
`;

}

/* PICK WINNER */

function pick(id){

document.querySelectorAll(".card").forEach(c=>c.classList.remove("winner"));
document.getElementById(id).classList.add("winner");

}

/* RESET */

function resetMatch(){

teamA.value="";
teamB.value="";

cardA.innerHTML=placeholder("Team A");
cardB.innerHTML=placeholder("Team B");

}

function placeholder(label){

return `
<div class="card placeholder">
<h2>${label}</h2>
<p>Select a team above</p>
</div>
`;

}

/* INIT */

populate();

new Choices('#teamA',{searchEnabled:true,shouldSort:false,itemSelectText:''});
new Choices('#teamB',{searchEnabled:true,shouldSort:false,itemSelectText:''});

teamA.addEventListener("change",render);
teamB.addEventListener("change",render);

resetMatch();

</script>
